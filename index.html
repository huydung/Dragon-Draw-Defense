<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viking Raid Sentry</title>
  </head>
  <body>
    <main id="app" aria-label="Viking Raid Sentry prototype">
      <section id="game-shell">
        <div id="hud" aria-live="polite">
          <div id="health" class="hud-panel"></div>
          <div id="wave" class="hud-panel"></div>
          <div id="score" class="hud-panel"></div>
        </div>

        <canvas id="game-canvas" aria-label="Gesture defense playfield"></canvas>

        <div id="feedback" aria-live="polite"></div>

        <button id="sandbox-toggle" type="button" aria-expanded="false" aria-controls="sandbox-panel">
          Sandbox
        </button>

        <aside id="sandbox-panel" aria-label="Diagnostic sandbox panel" hidden>
          <button id="sandbox-close" type="button" aria-label="Close sandbox panel">×</button>
          <h2>Sandbox Recorder</h2>
          <button id="export-shape" type="button">Export Drawn Shape</button>
          <textarea id="export-box" readonly spellcheck="false" aria-label="Exported drawn shape JSON"></textarea>
        </aside>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
