<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viking Raid Sentry</title>
  </head>
  <body>
    <main id="app" aria-label="Viking Raid Sentry prototype">
      <section id="game-shell">
        <div id="hud" aria-live="polite">
          <div id="health" class="hud-panel"></div>
          <div id="wave" class="hud-panel"></div>
          <div id="score" class="hud-panel"></div>
        </div>

        <canvas id="game-canvas" aria-label="Gesture defense playfield"></canvas>

        <div id="feedback" aria-live="polite"></div>
        <div id="wave-banner" aria-live="polite"></div>

        <div id="game-over" hidden>
          <section id="game-over-panel" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
            <h1 id="game-over-title">DEFEAT</h1>
            <p id="final-score"></p>
            <button id="restart-game" type="button">Restart Prototype</button>
            <div id="leaderboard-placeholder" aria-label="Future leaderboard placeholder"></div>
          </section>
        </div>

        <a id="sandbox-link" href="/sandbox.html">
          Sandbox
        </a>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
