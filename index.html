<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viking Raid Sentry</title>
  </head>
  <body>
    <main id="app" aria-label="Viking Raid Sentry prototype">
      <section id="game-shell">
        <div id="hud" aria-live="polite">
          <div id="health" class="hud-panel"></div>
          <div id="wave" class="hud-panel"></div>
          <div id="score" class="hud-panel"></div>
        </div>

        <canvas id="game-canvas" aria-label="Gesture defense playfield"></canvas>

        <div id="feedback" aria-live="polite"></div>
        <div id="wave-banner" aria-live="polite"></div>

        <div id="game-over" hidden>
          <section id="game-over-panel" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
            <h1 id="game-over-title"></h1>
            <p id="final-summary"></p>
            <p id="final-score"></p>
            <p id="final-high-score"></p>
            <button id="restart-game" type="button">Play Again</button>
            <section id="leaderboard" aria-label="Recent local high scores">
              <h2>Recent High Scores</h2>
              <ol id="high-score-list"></ol>
            </section>
          </section>
        </div>

        <a id="sandbox-link" href="./sandbox.html">
          Sandbox
        </a>
        <button id="audio-toggle" type="button" aria-pressed="true">
          Audio On
        </button>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
